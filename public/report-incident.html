
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Management</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#050d26;
color:#e6faff;
}

/* HEADER */

.header{
position:relative;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 40px;
border-bottom:2px solid #00eaff;
}

.center-title{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:28px;
color:#00eaff;
letter-spacing:3px;
font-family:'Orbitron',sans-serif;

/* glow effect */

text-shadow:
0 0 6px #00eaff,
0 0 12px #00eaff,
0 0 25px #00eaff,
0 0 40px #00cfff;
}

.left-section{width:150px;}
.right-section{width:150px;display:flex;justify-content:flex-end;}

.back-btn{
background:#050d26;
border:1px solid #00eaff;
color:#00eaff;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.back-btn:hover{
box-shadow:
0 0 8px #00eaff,
0 0 18px #00eaff,
0 0 30px #00eaff;
transform:scale(1.05);
}

.profile-btn{
width:40px;
height:40px;
border-radius:50%;
border:1px solid #39ff88;
background:#050d26;
color:#39ff88;
cursor:pointer;
}
.profile-btn:hover{
box-shadow:
0 0 8px #00eaff,
0 0 18px #00eaff,
0 0 30px #00eaff;
transform:scale(1.05);
}

.title{
font-size:28px;
color:#39ff88;
padding:20px 30px;
font-weight:600;

/* glow effect */

text-shadow:
0 0 2px #39ff88,
0 0 2px #39ff88,
0 0 2px #00ffcc,
0 0 2px #00ffcc;
}

.subtitle{
margin:6px 0 0 0;
font-size:14px;
color:#8edfff;
letter-spacing:1px;
opacity:0.9;

/* no glow */
text-shadow:none;
}

.report-container{
display:flex;
justify-content:flex-end;
padding:0 30px 10px;
}

.report-btn{
background:linear-gradient(45deg,#ff004c,#ff2f74);
border:none;
padding:12px 26px;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;

/* glow */

box-shadow:
0 0 8px #ff004c,
0 0 18px #ff004c,
0 0 35px #ff2f74;
}

/* hover glow */

.report-btn:hover{
box-shadow:
0 0 12px #ff004c,
0 0 25px #ff004c,
0 0 45px #ff2f74;
transform:scale(1.05);
}

/* FILTER */

.filter-container{
padding:0 30px 20px;
display:flex;
gap:10px;
}

.filter{
padding:10px 18px;
border-radius:8px;
border:1px solid #00eaff;
background:transparent;
color:#8edfff;
cursor:pointer;
}

/* ALL */

.filter.all.active{
background:#00eaff;
color:black;
box-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 35px #00eaff;
}

/* CRITICAL */

.filter.critical.active{
background:#ff004c;
color:white;
border:1px solid #ff004c;
box-shadow:
0 0 10px #ff004c,
0 0 20px #ff004c,
0 0 35px #ff004c;
}

/* MAJOR */

.filter.major.active{
background:#ffd000;
color:black;
border:1px solid #ffd000;
box-shadow:
0 0 10px #ffd000,
0 0 20px #ffd000,
0 0 35px #ffd000;
}

/* MINOR */

.filter.minor.active{
background:#00ff88;
color:black;
border:1px solid #00ff88;
box-shadow:
0 0 10px #00ff88,
0 0 20px #00ff88,
0 0 35px #00ff88;
}

/* hover */

.filter:hover{
transform:scale(1.05);
box-shadow:0 0 10px #00eaff;
}


/* OPEN FILTER */

.filter.open.active{
background:#ff004c;
color:white;
border:1px solid #ff004c;

box-shadow:
0 0 10px #ff004c,
0 0 20px #ff004c,
0 0 35px #ff004c;
}

/* RESOLVED FILTER */

.filter.resolved.active{
background:#00ff88;
color:black;
border:1px solid #00ff88;

box-shadow:
0 0 10px #00ff88,
0 0 20px #00ff88,
0 0 35px #00ff88;
}

/* OPTIONAL HOVER GLOW */

.filter.open:hover{
box-shadow:
0 0 8px #ff004c,
0 0 18px #ff004c;
}

.filter.resolved:hover{
box-shadow:
0 0 8px #00ff88,
0 0 18px #00ff88;
}

/* GRID */

.incident-grid{
display:flex;
flex-direction:column;
gap:15px;
padding:30px;
}

.incident-card{
display:flex;
justify-content:space-between;
align-items:center;
background:#081336;
border:1px solid #00eaff;
border-radius:10px;
padding:18px 25px;
}


.incident-id{
color:#00eaff;
font-weight:600;
}

/* SEVERITY */

.badge{
padding:6px 14px;
border-radius:8px;
font-size:12px;
font-weight:700;
}

.badge.critical{
background:#ff004c;
color:white;
box-shadow:0 0 10px #ff004c,0 0 25px #ff004c;
}

.badge.major{
background:#ffd000;
color:black;
box-shadow:0 0 10px #ffd000,0 0 25px #ffd000;
}

.badge.minor{
background:#00ff88;
color:black;
box-shadow:0 0 10px #00ff88,0 0 25px #00ff88;
}

/* RIGHT SIDE SECTION */

.card-right{
display:flex;
flex-direction:row;
align-items:center;
gap:12px;
}

.file-row{
display:flex;
align-items:center;
gap:12px;
}

.file-btns{
display:flex;
align-items:center;
gap:10px;
flex-wrap:nowrap;   /* prevents second row */
}

/* OPEN BUTTON */

.open-btn{
background:#00eaff;
border:none;
padding:6px 14px;
border-radius:6px;
color:black;
cursor:pointer;
font-weight:600;
white-space:nowrap;
}

.download-btn{
background:#39ff88;
border:none;
padding:6px 14px;
border-radius:6px;
color:black;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-box{
width:750px;
max-height:90vh;
overflow-y:auto;
background:#081336;
border-radius:14px;
padding:35px;
border:1px solid #00eaff;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* ROUND CLOSE BUTTON */

.close-btn{
display:flex;
align-items:center;
justify-content:center;
width:36px;
height:36px;
border-radius:50%;
background:#ff004c;
color:white;
font-size:16px;
cursor:pointer;

/* glow */

box-shadow:
0 0 8px #ff004c,
0 0 16px #ff004c,
0 0 28px #ff004c;

/* blink animation */

animation:blinkGlow 1.2s infinite alternate;
}

/* BLINK ANIMATION */

@keyframes blinkGlow{

0%{
box-shadow:
0 0 4px #ff004c,
0 0 10px #ff004c;
}

100%{
box-shadow:
0 0 12px #ff004c,
0 0 30px #ff004c,
0 0 50px #ff004c;
}

}

.form-group{
margin-bottom:18px;
display:flex;
flex-direction:column;
}

input,select,textarea{
padding:10px;
border-radius:6px;
border:1px solid #00eaff;
background:#050d26;
color:white;
}

textarea{height:100px}

/* BUTTON GROUP */

.btn-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn-option{
padding:10px 18px;
border-radius:8px;
border:1px solid #00eaff;
background:transparent;
color:#8edfff;
cursor:pointer;
}

.btn-option.active{
background:#00eaff;
color:black;
}

/* UPLOAD */

.upload-box{
border:2px dashed #00eaff;
border-radius:10px;
padding:25px;
text-align:center;
cursor:pointer;
}

.file-list{margin-top:10px;font-size:12px;}

.submit{
margin-top:20px;
background:linear-gradient(45deg,#ff004c,#ff2f74);
border:none;
padding:14px;
width:100%;
border-radius:8px;
color:white;
cursor:pointer;
}

/* IMAGE VIEWER */

.image-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
}

.image-box{
position:relative;
width:95%;
height:95%;
display:flex;
justify-content:center;
align-items:center;
}

.image-box img{
max-width:95%;
max-height:95%;
border-radius:12px;
border:3px solid #00eaff;
box-shadow:0 0 10px #00eaff,0 0 25px #00eaff;
transform-origin:center center;
}

.image-close{
position:absolute;
top:-18px;
right:-18px;
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#ff004c;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 10px #ff004c,0 0 25px #ff004c;
}

.meta-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:12px;
}

.meta-box{
background:#081336;
border:1px solid #00eaff;
border-radius:8px;
padding:10px;
text-align:center;

box-shadow:
0 0 6px #00eaff,
0 0 12px #00eaff;
}

.meta-value{
font-size:14px;
color:#ffffff;
font-weight:600;
margin-bottom:4px;
}

.meta-label{
font-size:13px;
color:#00eaff;
letter-spacing:1px;
opacity:0.9;
}

.resources{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:6px;
}

.resource-btn{
padding:10px;
border-radius:8px;
border:1px solid #00eaff;
background:transparent;
color:#8edfff;
cursor:pointer;
text-align:center;
font-size:13px;
transition:0.2s;
}

.resource-btn:hover{
transform:scale(1.05);
box-shadow:0 0 10px #00eaff;
}

.resource-btn.active{
background:#00eaff;
color:black;
box-shadow:0 0 10px #00eaff,0 0 20px #00eaff;
}

/* RESOLVE BUTTON */

.resolve-btn{
background:#00ff88;
border:none;
padding:6px 14px;
border-radius:6px;
color:black;
cursor:pointer;
font-weight:600;
white-space:nowrap;
}

/* STATUS */

/* STATUS BASE STYLE */

.status{
display:inline-flex;
align-items:center;
justify-content:center;

padding:5px 12px;

font-size:12px;
font-weight:600;
letter-spacing:1px;

border-radius:6px;

white-space:nowrap;
}

/* OPEN STATUS */

.status.open{
background:#ff4d4d;
color:#ffffff;

box-shadow:
0 0 6px rgba(255,77,77,0.7),
0 0 12px rgba(255,77,77,0.4);
}

/* RESOLVED STATUS */

.status.resolved{
background:#2ecc71;
color:#ffffff;

box-shadow:
0 0 6px rgba(46,204,113,0.7),
0 0 12px rgba(46,204,113,0.4);
}

.card-right{
display:flex;
flex-direction:column;
gap:8px;
align-items:flex-end;
}

.top-row{
display:flex;
align-items:center;
gap:10px;
}

.bottom-row{
display:flex;
gap:10px;
}

/* OPEN STATUS BUTTON */

.open-btn_t{
width:34px;
height:34px;

display:flex;
align-items:center;
justify-content:center;

background:#0288d1;
color:white;

border:none;
border-radius:6px;

cursor:pointer;
font-size:14px;

transition:0.2s;
}

/* HOVER EFFECT */

.open-btn_t:hover{
background:#039be5;
transform:scale(1.05);
box-shadow:0 0 8px rgba(0,180,255,0.6);
}

/* ICON STYLE */

.open-btn_t i{
pointer-events:none;
}


.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
margin-bottom:40px;   /* creates gap before filters */
}

/* BASE STAT CARD */

.stat-card{
background:#081336;
padding:25px;
border-radius:14px;
border:1px solid #00eaff;
position:relative;
transition:0.3s;
}

/* HOVER GLOW */

.stat-card:hover{
transform:translateY(-4px);
box-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 40px #00eaff;
}

/* TOTAL INCIDENTS */

.stat-card.total{
border-color:#00eaff;
box-shadow:
0 0 8px #00eaff,
0 0 16px #00eaff;
}

.stat-card.total:hover{
box-shadow:
0 0 12px #00eaff,
0 0 25px #00eaff,
0 0 45px #00eaff;
}

/* OPEN INCIDENTS */

.stat-card.open{
border-color:#ff004c;
box-shadow:
0 0 8px #ff004c,
0 0 16px #ff004c;
}

.stat-card.open:hover{
box-shadow:
0 0 12px #ff004c,
0 0 25px #ff004c,
0 0 45px #ff004c;
}

/* RESOLVED */

.stat-card.resolved{
border-color:#00ff88;
box-shadow:
0 0 8px #00ff88,
0 0 16px #00ff88;
}

.stat-card.resolved:hover{
box-shadow:
0 0 12px #00ff88,
0 0 25px #00ff88,
0 0 45px #00ff88;
}

/* CRITICAL */

.stat-card.critical{
border-color:#ffd000;
box-shadow:
0 0 8px #ffd000,
0 0 16px #ffd000;
}

.stat-card.critical:hover{
box-shadow:
0 0 12px #ffd000,
0 0 25px #ffd000,
0 0 45px #ffd000;
}

/* MAJOR */

.stat-card.major{
border-color:#ff8800;
box-shadow:
0 0 8px #ff8800,
0 0 16px #ff8800;
}

/* MINOR */

.stat-card.minor{
border-color:#00eaff;
box-shadow:
0 0 8px #00eaff,
0 0 16px #00eaff;
}

/* ICON STYLE */

.stat-icon{
font-size:26px;
margin-bottom:15px;
}

/* NUMBER */

.stat-number{
font-size:36px;
font-weight:700;
margin-bottom:8px;
}

/* LABEL */

.stat-label{
font-size:14px;
color:#9ccfff;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="header">
<div class="left-section">
<button class="back-btn" onclick="goBack()">
  Back
</button>
</div>

<div class="center-title">TGICCC</div>

<div class="right-section">
<button class="back-btn" onclick="goProfile()">
 👤 Profile
</button>
</div>
</div>

<div class="title">
⚠ INCIDENT MANAGEMENT
<p class="subtitle">Monitor and Manage All Reported Incidents Across TGiCCC</p>
</div>


<div class="report-container">
<button class="report-btn" onclick="openModal()">
<i class="fa-solid fa-bell"></i> Report Incident
</button>
</div>


<div class="stats-grid">

<div class="stat-card total">
<div class="stat-icon"><i class="fa-solid fa-chart-column"></i></div>
<div class="stat-number" id="totalIncidents">0</div>
<div class="stat-label">TOTAL INCIDENTS</div>
</div>

<div class="stat-card open">
<div class="stat-icon"><i class="fa-solid fa-hourglass-half"></i></div>
<div class="stat-number" id="openIncidents">0</div>
<div class="stat-label">OPEN INCIDENTS</div>
</div>

<div class="stat-card resolved">
<div class="stat-icon"><i class="fa-solid fa-check"></i></div>
<div class="stat-number" id="resolvedIncidents">0</div>
<div class="stat-label">RESOLVED</div>
</div>

<div class="stat-card critical">
<div class="stat-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
<div class="stat-number" id="criticalIncidents">0</div>
<div class="stat-label">CRITICAL</div>
</div>

<div class="stat-card major">
<div class="stat-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
<div class="stat-number" id="majorIncidents">0</div>
<div class="stat-label">MAJOR</div>
</div>

<div class="stat-card minor">
<div class="stat-icon"><i class="fa-solid fa-circle-info"></i></div>
<div class="stat-number" id="minorIncidents">0</div>
<div class="stat-label">MINOR</div>
</div>
</div>

</div>




<div class="filter-container">
<button class="filter all active" onclick="filterIncidents('ALL',event)">All</button>

<button class="filter critical" onclick="filterIncidents('CRITICAL',event)">Critical</button>

<button class="filter major" onclick="filterIncidents('MAJOR',event)">Major</button>

<button class="filter minor" onclick="filterIncidents('MINOR',event)">Minor</button>
 
<button class="filter open" onclick="filterIncidents('OPEN',event)">Open</button>

<button class="filter resolved" onclick="filterIncidents('RESOLVED',event)">Resolved</button>

</div>

<div class="incident-grid" id="incidentGrid"></div>

<!-- INCIDENT MODAL -->

<div class="modal" id="modal">
<div class="modal-box">

<div class="modal-header">
<h2>REPORT INCIDENT</h2>
<span class="close-btn" onclick="closeModal()">✖</span>
</div>

<div class="form-group">
<label>Incident ID</label>
<input id="incidentID" readonly>
</div>

<div class="form-group">
<label>Category</label>
<select id="category">
<option value="">Select Category</option> 
<option>Fire Emergency</option>
<option>Medical Emergency</option> 
<option>Accident</option> 
<option>Public Disorder</option>
<option>Nature Disaster</option> 
<option>Infrastructure</option> 
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Title</label>
<input id="title">
</div>

<div class="form-group">
<label>Severity</label>
<div class="btn-group severity">
<button class="btn-option">CRITICAL</button>
<button class="btn-option">MAJOR</button>
<button class="btn-option">MINOR</button>
</div>
</div>

<div class="form-group">
<label>District</label>
<select id="district">
<option value="">Select District</option>
<option>Hyderabad</option> 
<option>Rangareddy</option> 
<option>Medchal</option> 
<option>Warangal</option>
<option>Khammam</option> 
<option>Nalgonda</option> 
<option>Mahbubnagar</option> 
<option>Nizamabad</option> 
<option>Adilabad</option>
<option>Sangareddy</option> 
<option>Medak</option> 
<option>Nagarkurnool</option>
<option>Wanaparthy</option>
<option>Jogulamba Gadwal</option>
<option>Kamareddy</option> 
<option>Karimnagar</option> 
<option>Jayashankar Bhupalpally</option> 
<option>Peddapalli</option>
<option>Siddipet</option> 
<option>Yadadri Bhuvanagiri</option>
</select>
</div>

<div class="form-group">
<label>Location</label>
<input id="location">
</div>

<div class="form-group">
<label>Crowd Size</label>
<div class="btn-group crowd">
<button class="btn-option">NONE</button>
<button class="btn-option">1-50</button>
<button class="btn-option">51-200</button>
<button class="btn-option">200+</button>
</div>
</div>

<div class="form-group">
<label>Resources</label>
<div class="btn-group resources">
<button class="btn-option resource-btn">
 <i class="fa-solid fa-shield-halved">
</i> POLICE </button>
 <button class="btn-option resource-btn">
 <i class="fa-solid fa-truck-medical">
</i> AMBULANCE </button> 
<button class="btn-option resource-btn">
 <i class="fa-solid fa-fire-extinguisher">
</i> FIRE </button> 
<button class="btn-option resource-btn">
 <i class="fa-solid fa-traffic-light">
</i> TRAFFIC 
</button>
 <button class="btn-option resource-btn">
 <i class="fa-solid fa-truck"></i> CRANE 
</button>
 <button class="btn-option resource-btn">
 <i class="fa-solid fa-toolbox"></i> OTHER 
</button>
</div>
</div>

<div class="form-group">
<label>Reported By</label>
<input id="reportedBy" placeholder="Enter reporter name">
</div>

<div class="form-group">
<label>Reported Time</label>
<input type="datetime-local" id="reportedTime">
</div>

<div class="form-group">
<label>Assigned To</label>
<input id="assignedTo" placeholder="Officer / Department">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<div class="form-group">
<label>Contact (Optional)</label>
<input id="contact">
</div>

<div class="form-group">
<label>Attached Files (Images / Videos / Documents)</label>
<div class="upload-box" id="uploadBox">
Drag and Drop or Click to upload
<input type="file" id="fileInput" hidden>
</div>
<div class="file-list" id="fileList"></div>
</div>

<button class="submit">Submit Incident</button>

</div>
</div>

<!-- IMAGE VIEWER -->

<div class="image-modal" id="imageModal">
<div class="image-box">
<button class="image-close" onclick="closeImage()">✖</button>
<img id="previewImage">
</div>
</div>

<script>

let allIncidents=[];
let scale=1;

/* MODAL */

function openModal(){
document.getElementById("modal").style.display="flex";
document.getElementById("incidentID").value="INC-"+Math.floor(Math.random()*100000000);
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* BUTTON GROUP */

document.querySelectorAll(".btn-group").forEach(group=>{
let buttons=group.querySelectorAll(".btn-option");

buttons.forEach(btn=>{
btn.onclick=()=>{
if(group.classList.contains("resources")){
btn.classList.toggle("active");
}else{
buttons.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}
};
});
});

/* FILE */

let uploadBox=document.getElementById("uploadBox");
let fileInput=document.getElementById("fileInput");
let fileList=document.getElementById("fileList");

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=()=>{
fileList.innerHTML=fileInput.files[0]?.name || "";
};

/* SUBMIT */

document.querySelector(".submit").onclick=async()=>{

let severity=document.querySelector(".severity .active")?.innerText || "";
let crowd_size=document.querySelector(".crowd .active")?.innerText || "";

let resources=[...document.querySelectorAll(".resources .active")]
.map(b=>b.innerText).join(",");


/* VALIDATION */

if(
!category ||
!title ||
!district ||
!location ||
!severity ||
!crowd_size ||
!resources ||
!reportedBy ||
!reportedTime ||
!assignedTo ||
!description
){

alert("Please fill all fields");
return;

}


let formData=new FormData();

formData.append("incident_id",document.getElementById("incidentID").value);
formData.append("category",document.getElementById("category").value);
formData.append("title",document.getElementById("title").value);
formData.append("district",document.getElementById("district").value);
formData.append("location",document.getElementById("location").value);
formData.append("severity",severity);
formData.append("crowd_size",crowd_size);
formData.append("resources",resources);
formData.append("description",document.getElementById("description").value);
formData.append("reported_by",document.getElementById("reportedBy").value);
formData.append("reported_time",document.getElementById("reportedTime").value);
formData.append("assigned_to",document.getElementById("assignedTo").value);
formData.append("contact",document.getElementById("contact").value);

if(fileInput.files[0]){
formData.append("file",fileInput.files[0]);
}

await fetch("http://localhost:5000/reportIncident",{method:"POST",body:formData});

alert("Incident Successfully Saved");

resetForm();   // clear form

closeModal();
loadIncidents();
};

/* LOAD INCIDENTS */

async function loadIncidents(){

const res = await fetch("http://localhost:5000/incidents");
const data = await res.json();

allIncidents = data;

renderIncidents(allIncidents);
loadStats();

}

data.forEach(inc=>{

card.className="incident-card";

card.innerHTML=`

<div>

<div><b>Title:</b> ${inc.title}</div>
<div><b>Category:</b> ${inc.category}</div>
<div><b>Crowd_Size:</b> ${inc.crowd_size}</div>
<div><b>Resources:</b> ${inc.resources}</div>

<div class="meta-grid">

<div class="meta-box">
<div class="meta-label">District</div>
<div class="meta-value">${inc.district || "-"}</div>
</div>

<div class="meta-box">
<div class="meta-label">Location</div>
<div class="meta-value">${inc.location || "-"}</div>
</div>

<div class="meta-box">
<div class="meta-label">Reported By</div>
<div class="meta-value">${inc.reported_by || "-"}</div>
</div>

<div class="meta-box">
<div class="meta-label">Assigned To</div>
<div class="meta-value">${inc.assigned_to || "-"}</div>
</div>

<div class="meta-box">
<div class="meta-label">Reported Time</div>
<div class="meta-value">${inc.reported_time || "-"}</div>
</div>

</div>

</div>

<div class="card-right">

<!-- FIRST ROW -->

<div class="top-row">

<div class="badge ${(inc.severity||"").toLowerCase()}">
${inc.severity}
</div>

${(inc.status || "OPEN")==="OPEN" ?

`<button class="resolve-btn"
onclick="updateStatus('${inc.incident_id}','RESOLVED')">
Resolve

:

onclick="updateStatus('${inc.incident_id}','OPEN')">
Open
</button>`
}

${inc.file_path ? `
<button class="open-btn" onclick="openFile('${inc.file_path}')">

<button class="download-btn" onclick="downloadFile('${inc.file_path}')">
<i class="fa-solid fa-download"></i> Download
</button>
` : ""}

</div>

`;

});

}


/* FILTER */

function filterIncidents(type,event){

document.querySelectorAll(".filter")
.forEach(btn=>btn.classList.remove("active"));

event.target.classList.add("active");

if(type==="ALL"){
renderIncidents(allIncidents);
return;
}

/* SEVERITY FILTER */

if(type==="CRITICAL" || type==="MAJOR" || type==="MINOR"){

let filtered = allIncidents.filter(i =>
(i.severity || "").toUpperCase() === type
);

renderIncidents(filtered);
return;

}

if(type==="OPEN" || type==="RESOLVED"){

let filtered = allIncidents.filter(i =>
(i.status || "OPEN").toUpperCase() === type
);

renderIncidents(filtered);
return;

}

if(type==="OPEN" || type==="RESOLVED"){

let filtered = allIncidents.filter(i =>
(i.status || "OPEN").toUpperCase() === type
);

renderIncidents(filtered);
return;

}
}
/* IMAGE OPEN */

function openFile(path){

let modal=document.getElementById("imageModal");
let img=document.getElementById("previewImage");

img.src="http://localhost:5000/"+path;

modal.style.display="flex";
scale=1;
img.style.transform="scale(1)";
}

/* ZOOM */

document.getElementById("previewImage").addEventListener("wheel",function(e){

e.preventDefault();

if(e.deltaY<0){scale+=0.1}else{scale-=0.1}

if(scale<0.5) scale=0.5;
if(scale>5) scale=5;

this.style.transform=`scale(${scale})`;

});

/* CLOSE IMAGE */

function closeImage(){
document.getElementById("imageModal").style.display="none";
}

/* DOWNLOAD */

function downloadFile(path){
const link=document.createElement("a");
link.href="http://localhost:5000/"+path;
link.download="";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

loadIncidents();

function goBack(){
window.location.href = "dashboard.html";
}

function goProfile(){
window.location.href = "profile.html";
}



function resetForm(){

document.getElementById("category").value="";
document.getElementById("title").value="";
document.getElementById("district").value="";
document.getElementById("location").value="";
document.getElementById("description").value="";
document.getElementById("contact").value="";
document.getElementById("reportedBy").value="";
document.getElementById("reportedTime").value="";
document.getElementById("assignedTo").value="";

fileInput.value="";
fileList.innerHTML="";

/* remove active buttons */

document.querySelectorAll(".btn-option").forEach(btn=>{
btn.classList.remove("active");
});

}



/* STATS */

function loadStats(){

let total=allIncidents.length;

let open=allIncidents.filter(i=>
(i.status || "OPEN").toUpperCase()==="OPEN"
).length;

let resolved=allIncidents.filter(i=>
(i.status || "").toUpperCase()==="RESOLVED"
).length;

let critical=allIncidents.filter(i=>
(i.severity || "").toUpperCase()==="CRITICAL"
).length;

let major=allIncidents.filter(i=>
(i.severity || "").toUpperCase()==="MAJOR"
).length;

let minor=allIncidents.filter(i=>
(i.severity || "").toUpperCase()==="MINOR"
).length;

document.getElementById("totalIncidents").innerText=total;
document.getElementById("openIncidents").innerText=open;
document.getElementById("resolvedIncidents").innerText=resolved;
document.getElementById("criticalIncidents").innerText=critical;
document.getElementById("majorIncidents").innerText=major;
document.getElementById("minorIncidents").innerText=minor;

}


async function updateStatus(id,status){

const res = await fetch("http://localhost:5000/updateStatus",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
incident_id:id,
status:status
})
});

const result = await res.json();

if(result.success){

loadIncidents();

}else{

alert("Status update failed");

}

}
</script>
