<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>TGICCC Employee Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0a2b63,#0c3c7a,#0b2e66);
color:white;
text-align:center;
padding:40px;

/* PAGE BORDER */
border:2px solid #00eaff;
border-radius:12px;
margin:15px;

/* PAGE GLOW */
box-shadow:
0 0 20px rgba(0,234,255,0.5),
0 0 40px rgba(0,234,255,0.3) inset;
}

/* CLOSE BUTTON */

.close-btn{
position:absolute;
top:25px;
right:35px;
font-size:26px;
color:#ff2e63;
cursor:pointer;
font-weight:bold;
}

.close-btn:hover{
color:#ff4d4d;
text-shadow:0 0 10px #ff2e63;
}

/* TITLE */

.title{
font-family:'Orbitron';
font-size:24px;
letter-spacing:2px;
color:#00eaff;
margin-bottom:10px;
text-shadow:0 0 8px rgba(0,234,255,.6);
}

/* LOGO */

/* LOGO */

.logo{
width:210px;
height:210px;

border-radius:50%;
object-fit:contain;   /* keeps full image */

padding:10px;

border:3px solid #00eaff;

box-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 40px #00eaff;

margin-bottom:35px;
}

/* PROFILE CARD */

.profile-card{
width:380px;
margin:auto;
background:#071c36;
border-radius:12px;
padding:25px;
border:1px solid #00eaff40;
text-align:left;

box-shadow:
0 0 15px rgba(0,234,255,.2),
0 0 30px rgba(0,234,255,.15) inset;
}

.profile-card h3{
text-align:center;
margin-bottom:20px;
color:#00eaff;
letter-spacing:1px;
}

/* DETAILS */

.profile-item{
margin-bottom:12px;
font-size:15px;
padding:6px 0;
border-bottom:1px solid rgba(0,234,255,0.15);
}

.profile-item span{
color:#00eaff;
font-weight:bold;
}

</style>

</head>

<body>

<div class="close-btn" onclick="logout()">✖</div>

<h3 class="title">
TELANGANA INTEGRATED COMMAND AND CONTROL CENTRE
</h3>

<img src="/TGICCC_LOGO.png" class="logo">

<div class="profile-card">

<h3>Employee Details</h3>

<div class="profile-item">
Employee ID : <span id="empid"></span>
</div>

<div class="profile-item">
Name : <span id="name"></span>
</div>

<div class="profile-item">
Email : <span id="email"></span>
</div>

<div class="profile-item">
Phone : <span id="phone"></span>
</div>

<div class="profile-item">
Department : <span id="dept"></span>
</div>

</div>

<script>

async function loadUser(){

const empId = localStorage.getItem("employee_id");

if(!empId){
alert("User not logged in");
window.location.href="login.html";
return;
}

try{

const res = await fetch("http://localhost:5000/api/user/"+empId);
const user = await res.json();

document.getElementById("empid").innerText = user.employee_id;
document.getElementById("name").innerText = user.name;
document.getElementById("email").innerText = user.email;
document.getElementById("phone").innerText = user.phone;
document.getElementById("dept").innerText = user.department;

}catch(err){
console.error("Error loading user:",err);
}

}

function logout(){


window.location.href="dashboard.html";

}

loadUser();

</script>

</body>
</html>
